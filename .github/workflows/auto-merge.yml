name: Auto Merge PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == false

    steps:
      - uses: actions/checkout@v4

      - name: Validate PR scope
        if: >
          github.event.pull_request.base.ref != 'master' ||
          github.event.pull_request.head.ref != 'beta'
        run: exit 0

      - name: Skip draft PR
        if: github.event.pull_request.draft == true
        run: exit 0

      - name: Wait until PR is mergeable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}

          # Give GitHub time to update state
          sleep 5

          for i in {1..20}; do
            MERGEABLE=$(gh pr view "$PR" --json mergeStateStatus -q .mergeStateStatus)

            echo "Mergeable state: $MERGEABLE"

            if [ "$MERGEABLE" = "CLEAN" ]; then
              echo "PR is mergeable"
              break
            fi

            if [ "$i" = "20" ]; then
              echo "PR not mergeable after timeout"
              exit 1
            fi

            sleep 10
          done

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          SHA=${{ github.event.pull_request.head.sha }}

          gh pr merge "$PR" \
            --squash \
            --match-head-commit "$SHA" \
            --delete-branch=false