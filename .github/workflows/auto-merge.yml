name: Auto Merge PR

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == false &&
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.head.ref == 'beta' &&
      github.event.pull_request.draft == false

    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.FIELDTRACK_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}

          echo "Enabling auto-merge for PR #$PR"

          gh pr merge "$PR" \
            --auto \
            --squash \
            --delete-branch=false

          echo "✓ Auto-merge enabled - GitHub will merge when all checks pass"