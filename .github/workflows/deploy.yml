name: FieldTrack Backend CI/CD

# ─── Triggers ────────────────────────────────────────────────────────────────
# Push: only API-relevant changes trigger the full pipeline on master.
# PR:   run quality gates so reviewers see test status.
# Manual: three explicit modes for on-demand operations.

on:
  push:
    branches:
      - master
    paths:
      - "apps/api/**"
      - "packages/types/**"
      - "infra/**"
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"

  pull_request:
    branches:
      - master
    paths:
      - "apps/api/**"
      - "packages/types/**"
      - "infra/**"
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"

  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "deploy-and-test"
        type: choice
        options:
          - deploy
          - smoke-test
          - deploy-and-test

# ─── Shared setup steps (referenced as a comment; jobs inline them) ──────────
# All quality-gate jobs share the same pattern:
#   checkout → setup-node (npm cache) → npm ci → build packages/types → work

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # QUALITY GATES — run in parallel on every push / PR
  # ─────────────────────────────────────────────────────────────────────────────

  typecheck:
    name: TypeCheck (API)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Install dependencies
        run: |
          echo "::group::npm ci"
          T0=$SECONDS
          npm ci
          echo "::endgroup::"
          echo "⏱ install: $((SECONDS - T0))s"

      - name: Build shared types package
        run: npm run build -w packages/types

      - name: TypeScript check (API only — not web)
        working-directory: apps/api
        run: |
          T0=$SECONDS
          npx tsc --noEmit
          echo "⏱ typecheck: $((SECONDS - T0))s"


  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Install dependencies
        run: |
          echo "::group::npm ci"
          T0=$SECONDS
          npm ci
          echo "::endgroup::"
          echo "⏱ install: $((SECONDS - T0))s"

      - name: Build shared types package
        run: npm run build -w packages/types

      - name: Run unit tests
        working-directory: apps/api
        run: |
          T0=$SECONDS
          npx vitest run tests/unit/
          echo "⏱ unit tests: $((SECONDS - T0))s"


  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Install dependencies
        run: |
          echo "::group::npm ci"
          T0=$SECONDS
          npm ci
          echo "::endgroup::"
          echo "⏱ install: $((SECONDS - T0))s"

      - name: Build shared types package
        run: npm run build -w packages/types

      - name: Run integration tests
        working-directory: apps/api
        run: |
          T0=$SECONDS
          npx vitest run tests/integration/
          echo "⏱ integration tests: $((SECONDS - T0))s"


  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD — Docker image (only on push / deploy dispatch, after quality gates)
  # ─────────────────────────────────────────────────────────────────────────────

  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [typecheck, unit-tests, integration-tests]

    if: |
      github.event_name == 'push' ||
      github.event.inputs.mode == 'deploy' ||
      github.event.inputs.mode == 'deploy-and-test'

    permissions:
      contents: read
      packages: write

    outputs:
      sha_short: ${{ steps.sha.outputs.sha_short }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract commit SHA
        id: sha
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/rajashish147/fieldtrack-backend:${{ steps.sha.outputs.sha_short }}
            ghcr.io/rajashish147/fieldtrack-backend:latest
          # GHA layer cache — dramatically speeds up rebuilds when deps unchanged
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ─────────────────────────────────────────────────────────────────────────────
  # DEPLOY — Blue-green deployment on the VPS
  # ─────────────────────────────────────────────────────────────────────────────

  deploy:
    name: Deploy (Blue-Green)
    runs-on: ubuntu-latest
    needs: [build-image]

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -euo pipefail
            T0=$(date +%s)
            cd /home/ashish/FieldTrack-2.0
            git fetch origin
            git reset --hard origin/master
            chmod +x apps/api/scripts/deploy-bluegreen.sh
            ./apps/api/scripts/deploy-bluegreen.sh "${{ needs.build-image.outputs.sha_short }}"
            echo "⏱ deploy completed in $(($(date +%s) - T0))s"


  # ─────────────────────────────────────────────────────────────────────────────
  # INFRASTRUCTURE SYNC — nginx + monitoring configs
  # Runs after every deploy to ensure VPS always mirrors the repository.
  # Monitoring stack restart is CONDITIONAL on config file hash changes —
  # avoids unnecessary restarts when only application code changed.
  # ─────────────────────────────────────────────────────────────────────────────

  sync-infra:
    name: Sync Infrastructure
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Sync nginx + monitoring configs on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -euo pipefail
            T0=$(date +%s)
            REPO_DIR="/home/ashish/FieldTrack-2.0"
            INFRA_DIR="$REPO_DIR/infra"
            NGINX_LIVE="/etc/nginx/sites-enabled/fieldtrack.conf"
            ACTIVE_SLOT_FILE="$HOME/.fieldtrack-active-slot"
            INFRA_HASH_FILE="$HOME/.fieldtrack-infra-hash"
            API_DOMAIN=$(grep -E '^API_DOMAIN=' "$INFRA_DIR/.env.monitoring" 2>/dev/null | tail -1 | cut -d '=' -f2-)
            FRONTEND_DOMAIN=$(grep -E '^FRONTEND_DOMAIN=' "$INFRA_DIR/.env.monitoring" 2>/dev/null | tail -1 | cut -d '=' -f2-)
            API_DOMAIN=${API_DOMAIN:-api.fieldtrack.meowsician.tech}
            FRONTEND_DOMAIN=${FRONTEND_DOMAIN:-fieldtrack.meowsician.tech}

            # ── Nginx ──────────────────────────────────────────────────────────
            echo "=== Syncing Nginx config ==="

            # Determine which port is currently active so the rendered config
            # keeps routing to the correct backend slot.
            ACTIVE_SLOT=$(cat "$ACTIVE_SLOT_FILE" 2>/dev/null || echo "blue")
            if [ "$ACTIVE_SLOT" = "green" ]; then
              BACKEND_PORT=3002
            else
              BACKEND_PORT=3001
            fi

            # Back up current live config before overwriting.
            sudo cp "$NGINX_LIVE" /tmp/fieldtrack.conf.bak 2>/dev/null || true

            # Render the template with all placeholders substituted in one pass.
            # __BACKEND_PORT__ carries the active slot port (3001 or 3002).
            # __API_DOMAIN__ / __FRONTEND_DOMAIN__ carry the domain values.
            NGINX_TMP=$(mktemp /tmp/fieldtrack-nginx.XXXXXX.conf)
            sed \
              -e "s|__BACKEND_PORT__|$BACKEND_PORT|g" \
              -e "s|__API_DOMAIN__|$API_DOMAIN|g" \
              -e "s|__FRONTEND_DOMAIN__|$FRONTEND_DOMAIN|g" \
              "$INFRA_DIR/nginx/fieldtrack.conf" > "$NGINX_TMP"

            sudo cp "$NGINX_TMP" "$NGINX_LIVE"
            rm -f "$NGINX_TMP"

            # Validate before reloading; restore backup if nginx rejects the config.
            if ! sudo nginx -t 2>&1; then
              echo "ERROR: nginx configuration test failed. Restoring backup..."
              sudo cp /tmp/fieldtrack.conf.bak "$NGINX_LIVE"
              exit 1
            fi

            sudo systemctl reload nginx
            echo "Nginx reloaded (active slot: $ACTIVE_SLOT / port: $BACKEND_PORT)."

            # ── Monitoring stack (conditional on config hash) ─────────────────
            # Hash all non-nginx config files under /infra to detect changes.
            # Only restarts Prometheus / Grafana / Loki stack when configs change,
            # preventing unnecessary restarts on code-only deploys.
            echo "=== Checking monitoring config hash ==="
            # -readable: skip files not readable by the deploy user (e.g. root-owned docker volume files)
            # -r / --no-run-if-empty: don't invoke sha256sum if find produced no output
            # || echo "changed": if the pipeline still fails for any reason, default to restarting
            CURRENT_HASH=$(find "$INFRA_DIR" -readable \
              \( -name "*.yml" -o -name "*.yaml" -o -name "*.conf" -o -name "*.toml" -o -name "*.json" \) \
              -not -path "$INFRA_DIR/nginx/*" \
              | sort | xargs -r sha256sum 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "changed")
            STORED_HASH=$(cat "$INFRA_HASH_FILE" 2>/dev/null || echo "")

            if [ "$CURRENT_HASH" != "$STORED_HASH" ]; then
              echo "Monitoring configs changed — restarting stack..."
              cd "$INFRA_DIR"
              docker compose --env-file .env.monitoring -f docker-compose.monitoring.yml pull --quiet
              docker compose --env-file .env.monitoring -f docker-compose.monitoring.yml up -d
              echo "$CURRENT_HASH" > "$INFRA_HASH_FILE"
              echo "Monitoring stack updated."
            else
              echo "Monitoring configs unchanged — skipping restart."
            fi

            echo "⏱ infra sync completed in $(($(date +%s) - T0))s"


  # ─────────────────────────────────────────────────────────────────────────────
  # SMOKE TESTS — verify live API after deploy
  # Also runs standalone (mode=smoke-test) against an already-deployed API.
  # jq is pre-installed on ubuntu-latest — no apt-get install required.
  # ─────────────────────────────────────────────────────────────────────────────

  smoke-tests:
    name: API Smoke Tests
    runs-on: ubuntu-latest
    needs: [sync-infra]

    # Run after a successful deploy/sync-infra, OR standalone in smoke-test mode
    # when sync-infra was skipped (no new deploy, just validating existing API).
    if: |
      always() &&
      !cancelled() &&
      (
        needs.sync-infra.result == 'success' ||
        (
          github.event.inputs.mode == 'smoke-test' &&
          needs.sync-infra.result == 'skipped'
        )
      ) &&
      (
        github.event_name == 'push' ||
        github.event.inputs.mode == 'smoke-test' ||
        github.event.inputs.mode == 'deploy-and-test'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for API health
        env:
          FT_API_BASE_URL: ${{ secrets.FT_API_BASE_URL }}
        run: |
          BASE_URL="${FT_API_BASE_URL:-https://api.fieldtrack.meowsician.tech}"
          BASE_URL="${BASE_URL%/}"
          echo "Waiting for API to become ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "✓ API ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "✗ API did not become ready after 60s"
          exit 1

      - name: Run API Smoke Tests
        env:
          FT_API_BASE_URL: ${{ secrets.FT_API_BASE_URL }}
          FT_EMP_EMAIL: ${{ secrets.FT_EMP_EMAIL }}
          FT_EMP_PASSWORD: ${{ secrets.FT_EMP_PASSWORD }}
          FT_ADMIN_EMAIL: ${{ secrets.FT_ADMIN_EMAIL }}
          FT_ADMIN_PASSWORD: ${{ secrets.FT_ADMIN_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          T0=$SECONDS
          chmod +x apps/api/scripts/smoke-test.sh
          ./apps/api/scripts/smoke-test.sh
          echo "⏱ smoke tests: $((SECONDS - T0))s"

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: smoke-report.json


  # ─────────────────────────────────────────────────────────────────────────────
  # AUTO-ROLLBACK — triggers on deploy, infra-sync, or smoke-test failure.
  # Skipped in smoke-test-only mode (nothing was deployed to roll back).
  # ─────────────────────────────────────────────────────────────────────────────

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: [deploy, sync-infra, smoke-tests]

    if: |
      always() &&
      github.event.inputs.mode != 'smoke-test' &&
      (
        needs.deploy.result == 'failure' ||
        needs.sync-infra.result == 'failure' ||
        needs.smoke-tests.result == 'failure'
      )

    steps:
      - name: Rollback on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /home/ashish/FieldTrack-2.0
            chmod +x apps/api/scripts/rollback.sh
            ./apps/api/scripts/rollback.sh --auto

