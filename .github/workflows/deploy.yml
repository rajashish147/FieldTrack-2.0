name: Deploy FieldTrack Backend

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/rajashish147/fieldtrack-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${{ github.sha }} \
            ./backend

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            echo "Logging into GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling latest image..."
            docker pull ghcr.io/rajashish147/fieldtrack-backend:latest

            echo "Stopping old container..."
            docker stop fieldtrack || true
            docker rm fieldtrack || true

            echo "Starting new container..."
            docker run -d \
              --name fieldtrack \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file ~/FieldTrack-2.0/backend/.env \
              ghcr.io/rajashish147/fieldtrack-backend:latest

            echo "Deployment completed successfully"
