name: Sync beta ← master
# After deploy succeeds on master, merge master back into beta so both branches
# stay aligned. Uses GITHUB_TOKEN (default) for the push — this intentionally
# does NOT trigger auto-pr.yml (GitHub skips workflows triggered by GITHUB_TOKEN).

on:
  workflow_run:
    workflows: ["Deploy to Production"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: sync-beta
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Sync master → beta
        run: |
          git fetch origin
          git checkout beta
          git pull origin beta
          git merge origin/master --no-edit || {
            echo "::error::Merge conflict in sync-beta"
            exit 1
          }
          git push origin beta
          echo "✓ beta synced with master"
          git log --oneline -3