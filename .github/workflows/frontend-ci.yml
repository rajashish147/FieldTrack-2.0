name: Frontend CI

on:
  push:
    branches: [master, main]
    paths:
      - "apps/web/**"
      - "packages/types/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "apps/web/**"
      - "packages/types/**"

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type-check, lint, test & build
    runs-on: ubuntu-latest

    # apps/web/src/lib/env.ts validates NEXT_PUBLIC_* vars at import-time (Zod).
    # These must be present for typecheck, test, and build steps alike.
    #
    # Values below are CI-safe build-time defaults. Because all three vars are
    # NEXT_PUBLIC_* (inlined into the browser bundle), they carry no secrets.
    # Override any of them in GitHub → Settings → Secrets to use real values.
    env:
      NEXT_PUBLIC_API_URL: /api/proxy
      # Supabase project URL — a valid URL is required; this is public by design.
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      # Supabase anon key — public read-only JWT; placeholder satisfies min(1).
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder-anon-key
      # Mapbox public token — used for map tiles; placeholder satisfies min(1).
      NEXT_PUBLIC_MAPBOX_TOKEN: pk.ci-build-placeholder

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          # Explicit lock-file path ensures the cache key is correct in a monorepo
          # where there may be nested package-lock.json files.
          cache-dependency-path: "**/package-lock.json"

      - name: Install workspace dependencies
        # Run from repo root so npm workspaces resolves all packages together.
        run: npm ci

      - name: Build shared types
        run: npm run build -w packages/types

      - name: Dependency vulnerability scan
        run: npm audit --omit=dev --audit-level=high

      - name: TypeScript type-check (web)
        run: npm run type-check -w apps/web

      - name: ESLint (web)
        run: npm run lint -w apps/web

      - name: Run unit tests
        run: npm run test -w apps/web

      - name: Next.js build
        # Verifies the production bundle compiles successfully.
        # Catches import errors, missing env vars, and broken server components
        # that typecheck alone would not surface.
        run: npm run build -w apps/web

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage
          path: apps/web/coverage/
          retention-days: 7
