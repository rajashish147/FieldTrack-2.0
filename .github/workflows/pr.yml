name: PR Validation

on:
  pull_request:
    branches:
      - master

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v5

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/api/**'
              - 'packages/types/**'
            frontend:
              - 'apps/web/**'
              - 'packages/types/**'
            infra:
              - 'infra/**'
              - '.github/workflows/**'

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 15
    if: always()
    steps:
      - name: Abort if change detection failed
        if: needs.detect-changes.result != 'success'
        run: |
          echo "❌ Change detection did not succeed (result: ${{ needs.detect-changes.result }}) — cannot safely skip checks"
          exit 1

      - name: Skip if no backend changes
        if: needs.detect-changes.outputs.backend != 'true'
        run: |
          echo "No backend changes — skipping all backend validation"
          echo "✓ Backend CI (skipped)"
          exit 0

      - uses: actions/checkout@v5
        if: needs.detect-changes.outputs.backend == 'true'

      - uses: actions/setup-node@v5
        if: needs.detect-changes.outputs.backend == 'true'
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
        if: needs.detect-changes.outputs.backend == 'true'
      - run: npm run build -w packages/types
        if: needs.detect-changes.outputs.backend == 'true'
      - run: npx tsc --noEmit -p apps/api
        if: needs.detect-changes.outputs.backend == 'true'
      - name: Dependency vulnerability scan (production deps)
        if: needs.detect-changes.outputs.backend == 'true'
        run: npm audit --omit=dev --audit-level=high
      - name: Unit tests
        if: needs.detect-changes.outputs.backend == 'true'
        working-directory: apps/api
        run: npx vitest run tests/unit/
      - name: Integration tests
        if: needs.detect-changes.outputs.backend == 'true'
        working-directory: apps/api
        run: npx vitest run tests/integration/

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 15
    if: always()
    env:
      NEXT_PUBLIC_API_BASE_URL: /api/proxy
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder-anon-key
      NEXT_PUBLIC_MAPBOX_TOKEN: pk.ci-build-placeholder
    steps:
      - name: Abort if change detection failed
        if: needs.detect-changes.result != 'success'
        run: |
          echo "❌ Change detection did not succeed (result: ${{ needs.detect-changes.result }}) — cannot safely skip checks"
          exit 1

      - name: Skip if no frontend changes
        if: needs.detect-changes.outputs.frontend != 'true'
        run: |
          echo "No frontend changes — skipping all frontend validation"
          echo "✓ Frontend CI (skipped)"
          exit 0

      - uses: actions/checkout@v5
        if: needs.detect-changes.outputs.frontend == 'true'

      - uses: actions/setup-node@v5
        if: needs.detect-changes.outputs.frontend == 'true'
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
        if: needs.detect-changes.outputs.frontend == 'true'
      - run: npm run build -w packages/types
        if: needs.detect-changes.outputs.frontend == 'true'
      - run: npm run typecheck -w apps/web
        if: needs.detect-changes.outputs.frontend == 'true'
      - run: npm run lint -w apps/web
        if: needs.detect-changes.outputs.frontend == 'true'
      - run: npm run build -w apps/web
        if: needs.detect-changes.outputs.frontend == 'true'

  infra-ci:
    name: Infra CI
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 10
    if: always()
    steps:
      - name: Abort if change detection failed
        if: needs.detect-changes.result != 'success'
        run: |
          echo "❌ Change detection did not succeed (result: ${{ needs.detect-changes.result }}) — cannot safely skip checks"
          exit 1

      - name: Skip if no infra changes
        if: needs.detect-changes.outputs.infra != 'true'
        run: |
          echo "No infra changes — skipping all infra validation"
          echo "✓ Infra CI (skipped)"
          exit 0

      - uses: actions/checkout@v5
        if: needs.detect-changes.outputs.infra == 'true'

      - name: Validate nginx config
        if: needs.detect-changes.outputs.infra == 'true'
        run: |
          sed \
            -e 's/__BACKEND_PORT__/3001/g' \
            -e 's/__API_HOSTNAME__/api.test.local/g' \
            infra/nginx/fieldtrack.conf > /tmp/nginx.conf

          if grep -q '__[A-Z_]*__' /tmp/nginx.conf; then
            echo "❌ Unreplaced placeholders"
            exit 1
          fi

          mkdir -p /tmp/ssl
          openssl req -x509 -nodes -days 1 \
            -newkey rsa:2048 \
            -keyout /tmp/ssl/origin.key \
            -out /tmp/ssl/origin.crt \
            -subj "/CN=localhost"

          docker run --rm \
            -v /tmp/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
            -v /tmp/ssl:/etc/ssl/fieldtrack:ro \
            nginx:1.27-alpine nginx -t

  production-parity:
    name: Production Parity (Full Deploy Simulation)
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-ci, infra-ci]
    timeout-minutes: 20
    if: always()
    steps:
      - name: Abort if upstream CI failed
        if: needs.backend-ci.result == 'failure' || needs.infra-ci.result == 'failure'
        run: |
          echo "❌ Upstream CI failed — refusing to run production parity"
          exit 1

      - name: Skip if no backend/infra changes
        if: needs.detect-changes.outputs.backend != 'true' && needs.detect-changes.outputs.infra != 'true'
        run: echo "No backend/infra changes → skipping production parity"

      - uses: actions/checkout@v5
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true'

      - name: Build production image
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          docker build \
            -t fieldtrack-backend:pr \
            -f apps/api/Dockerfile \
            .

      - name: Capture image digest
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true'
        id: image-digest
        run: |
          DIGEST=$(docker inspect fieldtrack-backend:pr --format='{{.Id}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "$DIGEST" > image-digest.txt
          echo "Image digest: $DIGEST"

      - name: Cache Trivy DB
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true'
        uses: actions/cache@v4
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ runner.os }}-v1
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Pull Trivy vulnerability database
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          docker run --rm \
            -v /tmp/trivy-cache:/root/.cache \
            aquasec/trivy@sha256:91494b87ddc64f62860d52997532643956c24eeee0d0dda317d563c28c8581bc \
            image --download-db-only

      - name: Scan image with Trivy (HIGH/CRITICAL, ignore-unfixed)
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          docker run --rm \
            --network none \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /tmp/trivy-cache:/root/.cache \
            -v "$(pwd)/.trivyignore:/tmp/.trivyignore:ro" \
            aquasec/trivy@sha256:91494b87ddc64f62860d52997532643956c24eeee0d0dda317d563c28c8581bc image \
              --skip-db-update \
              --ignore-unfixed \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --ignorefile /tmp/.trivyignore \
              fieldtrack-backend:pr

      - name: Upload image-digest artifact (for deploy parity check)
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-pr-${{ github.event.pull_request.number }}
          path: image-digest.txt
          retention-days: 7

      - name: Validate CI env file exists
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: test -f apps/api/.env.ci || (echo "❌ Missing apps/api/.env.ci" && exit 1)

      - name: Start container (CI mode)
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          docker run -d \
            --name backend-blue \
            -p 127.0.0.1:3001:3000 \
            --env-file apps/api/.env.ci \
            -e CI_MODE=true \
            -e SKIP_EXTERNAL_SERVICES=true \
            fieldtrack-backend:pr

      - name: Verify container health
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true'
        run: |
          echo "=== Verifying container health ==="

          CONTAINER_NAME=$(docker ps --filter "name=backend-" --format "{{.Names}}" | head -1)

          if [ -z "$CONTAINER_NAME" ]; then
            echo "❌ No running backend container found"
            docker ps -a
            exit 1
          fi

          echo "Found container: $CONTAINER_NAME"

          # deterministic port
          if [[ "$CONTAINER_NAME" == *"blue"* ]]; then
            PORT=3001
          elif [[ "$CONTAINER_NAME" == *"green"* ]]; then
            PORT=3002
          else
            echo "❌ Unknown container"
            exit 1
          fi

          echo "Using port: $PORT"

          sleep 5

          HEALTH_OK=false
          for i in $(seq 1 30); do
            if ! docker ps --filter "name=$CONTAINER_NAME" --format "{{.Names}}" | grep -q "$CONTAINER_NAME"; then
              echo "❌ Container exited"
              docker logs "$CONTAINER_NAME" --tail 100 || true
              exit 1
            fi

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://127.0.0.1:$PORT/health" || echo "000")

            if [ "$STATUS" = "200" ]; then
              echo "✓ Health OK (attempt $i)"
              HEALTH_OK=true
              break
            fi

            echo "  attempt $i/30: HTTP $STATUS"
            sleep 2
          done

          if [ "$HEALTH_OK" != "true" ]; then
            echo "❌ Health check failed"
            docker logs "$CONTAINER_NAME" --tail 100 || true
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f backend-blue backend-green 2>/dev/null || true

      - name: Summary
        run: |
          echo "============================================="
          echo " Production Parity: PASSED ✅"
          echo "============================================="