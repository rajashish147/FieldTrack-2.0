name: PR Validation

on:
  pull_request:
    branches:
      - master

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v5

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/api/**'
              - 'packages/types/**'
            frontend:
              - 'apps/web/**'
              - 'packages/types/**'
            infra:
              - 'infra/**'
              - '.github/workflows/**'

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 15
    if: always()
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL_TEST }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_TEST }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_TEST }}
    steps:
      - name: Abort if change detection failed
        if: needs.detect-changes.result != 'success'
        run: |
          echo "❌ Change detection did not succeed (result: ${{ needs.detect-changes.result }}) — cannot safely skip checks"
          exit 1

      - name: Skip if no backend changes
        if: needs.detect-changes.outputs.backend != 'true'
        run: |
          echo "No backend changes — skipping all backend validation"
          echo "✓ Backend CI (skipped)"
          exit 0

      - uses: actions/checkout@v5
        if: needs.detect-changes.outputs.backend == 'true'

      - uses: actions/setup-node@v5
        if: needs.detect-changes.outputs.backend == 'true'
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
        if: needs.detect-changes.outputs.backend == 'true'
      - run: npm run build -w packages/types
        if: needs.detect-changes.outputs.backend == 'true'
      - run: npx tsc --noEmit -p apps/api
        if: needs.detect-changes.outputs.backend == 'true'
      - name: Dependency vulnerability scan (production deps)
        if: needs.detect-changes.outputs.backend == 'true'
        run: npm audit --omit=dev --audit-level=high
      - name: Unit tests
        if: needs.detect-changes.outputs.backend == 'true'
        working-directory: apps/api
        run: npx vitest run tests/unit/
      - name: Integration tests
        if: needs.detect-changes.outputs.backend == 'true'
        working-directory: apps/api
        run: npx vitest run tests/integration/

      - name: Build and validate container
        if: needs.detect-changes.outputs.backend == 'true'
        run: |
          docker build \
            -t fieldtrack-backend:ci-validation \
            -f apps/api/Dockerfile \
            .

      - name: Container bootstrap validation
        if: needs.detect-changes.outputs.backend == 'true'
        run: |
          docker run -d \
            --name fieldtrack-ci-test \
            -p 127.0.0.1:3001:3000 \
            --env-file apps/api/.env.ci \
            -e SUPABASE_URL=${{ secrets.SUPABASE_URL_TEST }} \
            -e SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY_TEST }} \
            -e SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY_TEST }} \
            fieldtrack-backend:ci-validation

          sleep 3

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3001/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /health returned HTTP $STATUS (expected 200)"
            docker logs fieldtrack-ci-test --tail 50
            exit 1
          fi

          docker rm -f fieldtrack-ci-test
          docker rmi fieldtrack-backend:ci-validation

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 15
    if: always()
    env:
      NEXT_PUBLIC_API_BASE_URL: /api/proxy
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder-anon-key
      NEXT_PUBLIC_MAPBOX_TOKEN: pk.ci-build-placeholder
    steps:
      - name: Abort if change detection failed
        if: needs.detect-changes.result != 'success'
        run: |
          echo "❌ Change detection did not succeed (result: ${{ needs.detect-changes.result }}) — cannot safely skip checks"
          exit 1

      - name: Skip if no frontend changes
        if: needs.detect-changes.outputs.frontend != 'true'
        run: |
          echo "No frontend changes — skipping all frontend validation"
          echo "✓ Frontend CI (skipped)"
          exit 0

      - uses: actions/checkout@v5
        if: needs.detect-changes.outputs.frontend == 'true'

      - uses: actions/setup-node@v5
        if: needs.detect-changes.outputs.frontend == 'true'
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
        if: needs.detect-changes.outputs.frontend == 'true'
      - run: npm run build -w packages/types
        if: needs.detect-changes.outputs.frontend == 'true'
      - run: npm run typecheck -w apps/web
        if: needs.detect-changes.outputs.frontend == 'true'
      - run: npm run lint -w apps/web
        if: needs.detect-changes.outputs.frontend == 'true'
      - run: npm run build -w apps/web
        if: needs.detect-changes.outputs.frontend == 'true'

  infra-ci:
    name: Infra CI
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 10
    if: always()
    steps:
      - name: Abort if change detection failed
        if: needs.detect-changes.result != 'success'
        run: |
          echo "❌ Change detection did not succeed (result: ${{ needs.detect-changes.result }}) — cannot safely skip checks"
          exit 1

      - name: Skip if no infra changes
        if: needs.detect-changes.outputs.infra != 'true'
        run: |
          echo "No infra changes — skipping all infra validation"
          echo "✓ Infra CI (skipped)"
          exit 0

      - uses: actions/checkout@v5
        if: needs.detect-changes.outputs.infra == 'true'

      - name: Validate nginx config
        if: needs.detect-changes.outputs.infra == 'true'
        run: |
          sed \
            -e 's/__BACKEND_PORT__/3001/g' \
            -e 's/__API_HOSTNAME__/api.test.local/g' \
            infra/nginx/fieldtrack.conf > /tmp/nginx.conf

          if grep -q '__[A-Z_]*__' /tmp/nginx.conf; then
            echo "❌ Unreplaced placeholders"
            exit 1
          fi

          mkdir -p /tmp/ssl
          openssl req -x509 -nodes -days 1 \
            -newkey rsa:2048 \
            -keyout /tmp/ssl/origin.key \
            -out /tmp/ssl/origin.crt \
            -subj "/CN=localhost"

          docker run --rm \
            -v /tmp/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
            -v /tmp/ssl:/etc/ssl/fieldtrack:ro \
            nginx:1.27-alpine nginx -t