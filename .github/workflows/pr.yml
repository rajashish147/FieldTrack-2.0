name: PR Validation

on:
  push:
    branches:
      - beta
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v5

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/api/**'
              - 'packages/types/**'
            frontend:
              - 'apps/web/**'
              - 'packages/types/**'
            infra:
              - 'infra/**'
              - '.github/workflows/**'

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
      - run: npm run build -w packages/types
      - run: npx tsc --noEmit -p apps/api
      - name: Unit tests
        working-directory: apps/api
        run: npx vitest run tests/unit/
      - name: Integration tests
        working-directory: apps/api
        run: npx vitest run tests/integration/

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - run: npm ci
      - run: npm run build -w packages/types
      - run: npm run typecheck -w apps/web
      - run: npm run lint -w apps/web
      - run: npm run build -w apps/web

  infra-ci:
    name: Infra CI
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Validate nginx config
        run: |
          sed \
            -e 's/__BACKEND_PORT__/3001/g' \
            -e 's/__API_HOSTNAME__/api.test.local/g' \
            infra/nginx/fieldtrack.conf > /tmp/nginx.conf

          if grep -q '__[A-Z_]*__' /tmp/nginx.conf; then
            echo "❌ Unreplaced placeholders"
            exit 1
          fi

          mkdir -p /tmp/ssl
          openssl req -x509 -nodes -days 1 \
            -newkey rsa:2048 \
            -keyout /tmp/ssl/origin.key \
            -out /tmp/ssl/origin.crt \
            -subj "/CN=localhost"

          docker run --rm \
            -v /tmp/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
            -v /tmp/ssl:/etc/ssl/fieldtrack:ro \
            nginx:alpine nginx -t

  production-parity:
    name: Production Parity (Full Deploy Simulation)
    runs-on: ubuntu-latest
    needs: [backend-ci, infra-ci]
    if: always()
    steps:
      - uses: actions/checkout@v5

      - name: Build production image
        run: |
          docker build \
            -t fieldtrack-backend:pr \
            -f apps/api/Dockerfile \
            .

      - name: Validate CI env file exists
        run: test -f apps/api/.env.ci || (echo "❌ Missing apps/api/.env.ci" && exit 1)

      - name: Start container (CI mode)
        run: |
          docker run -d \
            --name backend-blue \
            -p 127.0.0.1:3001:3000 \
            --env-file apps/api/.env.ci \
            -e CI_MODE=true \
            -e SKIP_EXTERNAL_SERVICES=true \
            fieldtrack-backend:pr

      - name: Verify container health
        run: |
          echo "=== Verifying container health ==="

          CONTAINER_NAME=$(docker ps --filter "name=backend-" --format "{{.Names}}" | head -1)

          if [ -z "$CONTAINER_NAME" ]; then
            echo "❌ No running backend container found"
            docker ps -a
            exit 1
          fi

          echo "Found container: $CONTAINER_NAME"

          # deterministic port
          if [[ "$CONTAINER_NAME" == *"blue"* ]]; then
            PORT=3001
          elif [[ "$CONTAINER_NAME" == *"green"* ]]; then
            PORT=3002
          else
            echo "❌ Unknown container"
            exit 1
          fi

          echo "Using port: $PORT"

          sleep 5

          HEALTH_OK=false
          for i in $(seq 1 30); do
            if ! docker ps --filter "name=$CONTAINER_NAME" --format "{{.Names}}" | grep -q "$CONTAINER_NAME"; then
              echo "❌ Container exited"
              docker logs "$CONTAINER_NAME" --tail 100 || true
              exit 1
            fi

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://127.0.0.1:$PORT/health" || echo "000")

            if [ "$STATUS" = "200" ]; then
              echo "✓ Health OK (attempt $i)"
              HEALTH_OK=true
              break
            fi

            echo "  attempt $i/30: HTTP $STATUS"
            sleep 2
          done

          if [ "$HEALTH_OK" != "true" ]; then
            echo "❌ Health check failed"
            docker logs "$CONTAINER_NAME" --tail 100 || true
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f backend-blue backend-green 2>/dev/null || true

      - name: Summary
        run: |
          echo "============================================="
          echo " Production Parity: PASSED ✅"
          echo "============================================="