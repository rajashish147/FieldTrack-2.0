name: Update Base Image Digests (Weekly)

# Why this workflow commits directly instead of opening a PR:
#
#   PRs created with GITHUB_TOKEN do not trigger other workflow runs — a
#   deliberate GitHub anti-loop restriction.  That means status checks on the
#   chore PR never pass and the PR is never mergeable, even with "allow GitHub
#   Actions to create PRs" enabled in repo settings.
#
#   The workaround (PAT / GitHub App token) adds secret-management overhead.
#   Instead, this workflow IS the quality gate: it builds the image with the
#   new digests and runs the identical Trivy scan that deploy.yml enforces.
#   Only a clean scan allows the commit to reach master.
#
#   Branch-protection bypass requirement:
#   In repo Settings → Branches → protection rule for master, enable
#   "Allow GitHub Actions to bypass required status checks" (or add this
#   workflow's identity to the bypass list).  Without that, the `git push`
#   below will be rejected by the protection rule.

on:
  schedule:
    - cron: '0 3 * * 1'  # Monday 03:00 UTC
  workflow_dispatch:

# pull-requests permission removed — no PR is created; direct push only.
permissions:
  contents: write

jobs:
  update-digests:
    name: Rotate base image digests
    runs-on: ubuntu-latest
    # Increased from 15 → 30 to accommodate build + Trivy scan.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve current node digest (linux/amd64)
        id: node-digest
        run: |
          DIGEST=$(docker manifest inspect node:24.2.0-bookworm-slim 2>/dev/null \
            | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' \
            | sed 's/sha256://' | head -c 64)
          if [ -z "$DIGEST" ]; then
            echo "::error::Failed to resolve node digest"
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Resolved node:24.2.0-bookworm-slim@sha256:$DIGEST"

      - name: Resolve current distroless digest (linux/amd64)
        id: distroless-digest
        run: |
          DIGEST=$(docker manifest inspect gcr.io/distroless/nodejs24-debian12:nonroot 2>/dev/null \
            | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' \
            | sed 's/sha256://' | head -c 64)
          if [ -z "$DIGEST" ]; then
            echo "::error::Failed to resolve distroless digest"
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Resolved gcr.io/distroless/nodejs24-debian12:nonroot@sha256:$DIGEST"

      - name: Update Dockerfile digests
        run: |
          FILE="Dockerfile"

          # Update node digest (Stages 1 + 2 both use bookworm-slim).
          sed -i "s|node:24.2.0-bookworm-slim@sha256:[a-f0-9]*|node:24.2.0-bookworm-slim@sha256:${{ steps.node-digest.outputs.digest }}|g" "$FILE"

          # Update distroless digest (Stage 3 and any alias stages that pin it).
          sed -i "s|gcr.io/distroless/nodejs24-debian12:nonroot@sha256:[a-f0-9]*|gcr.io/distroless/nodejs24-debian12:nonroot@sha256:${{ steps.distroless-digest.outputs.digest }}|g" "$FILE"

          # Refresh the "resolved YYYY-MM-DD" comment date.
          sed -i "s|resolved [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}|resolved $(date +'%Y-%m-%d')|g" "$FILE"

      - name: Check if digests changed
        id: changes
        run: |
          if git diff --quiet Dockerfile; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✓ Digests are already current — nothing to do"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "⚠ Base image digests have updated:"
            git diff Dockerfile
          fi

      # -----------------------------------------------------------------------
      # Validate the new image before committing.
      # Identical gates to deploy.yml: build → Trivy HIGH/CRITICAL/ignore-unfixed.
      # If either step fails the commit is never made; master stays clean.
      # -----------------------------------------------------------------------

      - name: Setup Node.js (needed for npm ci / build inside Docker)
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci

      - name: Build application (TypeScript → dist/)
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Build container image with updated digests
        if: steps.changes.outputs.changed == 'true'
        run: |
          docker build \
            --pull \
            --target production \
            --build-arg CACHE_BUSTER=${{ github.run_id }} \
            -t fieldtrack-api:digest-update \
            -f Dockerfile \
            .

      - name: Get date for Trivy DB cache key
        if: steps.changes.outputs.changed == 'true'
        id: trivy-date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy DB (daily refresh)
        if: steps.changes.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ runner.os }}-${{ steps.trivy-date.outputs.date }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Pull Trivy vulnerability database
        if: steps.changes.outputs.changed == 'true'
        run: |
          docker run --rm \
            -v /tmp/trivy-cache:/root/.cache \
            aquasec/trivy@sha256:91494b87ddc64f62860d52997532643956c24eeee0d0dda317d563c28c8581bc \
            image --download-db-only

      - name: Scan image with Trivy (HIGH/CRITICAL, ignore-unfixed)
        if: steps.changes.outputs.changed == 'true'
        run: |
          # Identical retry logic and flags to deploy.yml — ensures the same bar.
          SCAN_PASSED=false
          for i in 1 2 3; do
            if docker run --rm \
              --network none \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v /tmp/trivy-cache:/root/.cache \
              -v "$(pwd)/.trivyignore:/tmp/.trivyignore:ro" \
              aquasec/trivy@sha256:91494b87ddc64f62860d52997532643956c24eeee0d0dda317d563c28c8581bc image \
                --skip-db-update \
                --ignore-unfixed \
                --severity HIGH,CRITICAL \
                --exit-code 1 \
                --ignorefile /tmp/.trivyignore \
                fieldtrack-api:digest-update; then
              SCAN_PASSED=true
              break
            fi
            echo "Trivy attempt $i failed..."
            [ "$i" -lt 3 ] && sleep 5
          done
          if [ "$SCAN_PASSED" != "true" ]; then
            echo "::error::Trivy scan failed — HIGH/CRITICAL vulnerabilities in updated image. Digest update aborted; master unchanged."
            exit 1
          fi
          echo "✓ Trivy scan passed"

      # -----------------------------------------------------------------------
      # Auto-cleanup: drop the CVE-2026-28390 workaround once the new distroless
      # image ships libssl3 >= 3.0.19-1~deb12u2 natively.
      #
      # After rebuilding with the rotated digest, inspect the installed libssl3
      # version via dpkg metadata inside the image.  If >= 3.0.19, the three
      # security-patch stages in the Dockerfile and the .trivyignore entry are
      # dead code and are removed automatically.
      # -----------------------------------------------------------------------

      - name: Check if libssl3 patch is now baked into distroless
        if: steps.changes.outputs.changed == 'true'
        id: ssl-version
        run: |
          # Read the libssl3 version from the image's dpkg metadata.
          # distroless exposes /var/lib/dpkg (status or status.d/) without a shell,
          # so we use a busybox container mounting the image's filesystem via --volumes-from.
          HELPER=$(docker create fieldtrack-api:digest-update)
          SSL_VER=$(docker run --rm \
            --volumes-from "$HELPER" \
            busybox:1.36 \
            sh -c 'grep -A5 "^Package: libssl3" /var/lib/dpkg/status 2>/dev/null \
                   || find /var/lib/dpkg/status.d/ -name "libssl3" -exec cat {} \; 2>/dev/null' \
            | grep '^Version:' | awk '{print $2}' || echo "unknown")
          docker rm "$HELPER" >/dev/null
          echo "ssl_version=$SSL_VER" >> "$GITHUB_OUTPUT"
          echo "Detected libssl3 version in new image: $SSL_VER"

      - name: Remove CVE-2026-28390 workaround (libssl3 now patched in distroless)
        if: |
          steps.changes.outputs.changed == 'true' &&
          steps.ssl-version.outputs.ssl_version != 'unknown' &&
          steps.ssl-version.outputs.ssl_version >= '3.0.19'
        run: |
          echo "libssl3 ${{ steps.ssl-version.outputs.ssl_version }} >= 3.0.19 — removing temporary workaround"

          # 1. Remove stages 2.5a and 2.5b from Dockerfile.
          python3 - <<'PYEOF'
          import re, pathlib
          text = pathlib.Path("Dockerfile").read_text()
          # Remove everything from the stage-2.5a comment block through to (but not
          # including) "# ---- Stage 3" so that Stage 3 header is preserved.
          cleaned = re.sub(
              r'\n# ---- Stage 2\.5a:.*?(?=\n# ---- Stage 3:)',
              '',
              text,
              flags=re.DOTALL,
          )
          pathlib.Path("Dockerfile").write_text(cleaned)
          print("✓ Removed stages 2.5a / 2.5b from Dockerfile")
          PYEOF

          # 2. Remove the three overlay COPY lines from Stage 3.
          sed -i '/# Overlay patched libssl3/,/^COPY --from=security-patches.*\/var\/lib\/dpkg\//d' Dockerfile

          # 3. Remove CVE-2026-28390 entry from .trivyignore.
          python3 - <<'PYEOF'
          import re, pathlib
          text = pathlib.Path(".trivyignore").read_text()
          cleaned = re.sub(
              r'\n# -----------+\n# CVE-2026-28390\n.*?^CVE-2026-28390\n',
              '',
              text,
              flags=re.DOTALL | re.MULTILINE,
          )
          pathlib.Path(".trivyignore").write_text(cleaned)
          print("✓ Removed CVE-2026-28390 from .trivyignore")
          PYEOF

          echo "✓ Workaround cleanup complete — Dockerfile and .trivyignore updated"

      # -----------------------------------------------------------------------
      # Scan passed (and optional cleanup done) — commit directly to master.
      # The [skip ci] trailer prevents the push from re-triggering pr.yml or
      # deploy.yml on the maintenance commit itself; those pipelines are only
      # meaningful for feature/hotfix changes.
      # -----------------------------------------------------------------------

      - name: Commit and push to master
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage everything that may have changed (Dockerfile + .trivyignore).
          git add Dockerfile .trivyignore

          # Build a descriptive commit message.
          MSG="chore: rotate base image digests $(date +'%Y-%m-%d') [skip ci]

          node:24.2.0-bookworm-slim  → sha256:${{ steps.node-digest.outputs.digest }}
          distroless/nodejs24-debian12:nonroot → sha256:${{ steps.distroless-digest.outputs.digest }}

          Trivy scan: passed (HIGH/CRITICAL, ignore-unfixed)
          Validated by: ${{ github.workflow }} run ${{ github.run_id }}"

          git commit -m "$MSG"
          git push origin HEAD:${{ github.ref_name }}
