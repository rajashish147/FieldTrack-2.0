services:

  loki:
    image: grafana/loki:2.9.6
    container_name: loki
    restart: unless-stopped
    expose:
      - "3100"
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - api_network
    deploy:
      resources:
        limits:
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  promtail:
    image: grafana/promtail:2.9.6
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - promtail_data:/data
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - api_network
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    expose:
      - "9093"

    volumes:
      - ./alertmanager/alertmanager.rendered.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"

    networks:
      - api_network

    deploy:
      resources:
        limits:
          memory: 128m

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    expose:
      - "9090"

    environment:
      - METRICS_SCRAPE_TOKEN=${METRICS_SCRAPE_TOKEN}
      - API_HOSTNAME=${API_HOSTNAME}

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
      - "--web.enable-lifecycle"

    networks:
      - api_network

    depends_on:
      alertmanager:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 512m

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    expose:
      - "3000"

    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${API_HOSTNAME}/grafana

    volumes:
      - grafana_data:/var/lib/grafana

    networks:
      - api_network

    depends_on:
      prometheus:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 256m

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    restart: unless-stopped
    expose:
      - "9100"

    command:
      - "--path.rootfs=/host"

    volumes:
      - /:/host:ro,rslave

    networks:
      - api_network

    deploy:
      resources:
        limits:
          memory: 64m

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Rendered nginx config — written by deploy script on each deploy
      - ./nginx/live:/etc/nginx/conf.d:ro
      # SSL certificates (managed by certbot on the host)
      - /etc/ssl/api:/etc/ssl/api:ro
      # ACME challenge webroot for certbot renewal
      - /var/www/certbot:/var/www/certbot:ro
      # Nginx access logs shared with promtail
      - /var/log/nginx:/var/log/nginx

    networks:
      - api_network

    # nginx can start as soon as the grafana *container* exists.
    # Waiting for service_healthy would create a blocking chain:
    #   nginx → grafana → prometheus → alertmanager
    # which delays the ingress layer on fresh deployments by minutes.
    # nginx uses deferred Docker DNS ($api_backend variable + resolver 127.0.0.11)
    # so it starts cleanly before any backend container is ready.
    depends_on:
      grafana:
        condition: service_started

    deploy:
      resources:
        limits:
          memory: 64m

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  api_network:
    external: true

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  loki_data:
  promtail_data: