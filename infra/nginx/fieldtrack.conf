# ============================================================================
# FieldTrack 2.0 — Production Nginx Reverse Proxy
# ============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream fieldtrack_backend {
    server 127.0.0.1:__BACKEND_PORT__ max_fails=3 fail_timeout=30s;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=fieldtrack_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=fieldtrack_health:10m rate=5r/s;

# Cloudflare IPs
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;

real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name __API_HOSTNAME__;
    return 301 https://$host$request_uri;
}

# HTTPS SERVER
server {

    listen 443 ssl;
    listen [::]:443 ssl;
    # ❌ removed invalid http2 directive

    server_name __API_HOSTNAME__;

    ssl_certificate     /etc/ssl/fieldtrack/origin.crt;
    ssl_certificate_key /etc/ssl/fieldtrack/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    server_tokens off;

    # safer host validation (still simple)
    if ($host !~* ^(__API_HOSTNAME__|localhost|127\.0\.0\.1)$) {
    return 444;
    }

    # Allow only Cloudflare edge IP ranges to reach origin directly
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 108.162.192.0/18;
    allow 131.0.72.0/22;
    allow 141.101.64.0/18;
    allow 162.158.0.0/15;
    allow 172.64.0.0/13;
    allow 173.245.48.0/20;
    allow 188.114.96.0/20;
    allow 190.93.240.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    deny all;

    # Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://__API_HOSTNAME__; frame-ancestors 'self';" always;

    access_log /var/log/nginx/fieldtrack_access.log;
    error_log  /var/log/nginx/fieldtrack_error.log;

    client_max_body_size 10M;

    # Upstream timeout defaults for non-streaming traffic.
    # SSE keeps a longer read timeout in its location block.
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types application/json application/javascript text/css text/plain text/xml application/xml;

    # Block sensitive endpoints
    location /metrics { return 403; }
    location /internal { return 403; }
    location ~ ^/internal/ { return 403; }
    location /prometheus { return 403; }

    # Health
    location = /health {
        limit_req zone=fieldtrack_health burst=10 nodelay;
        proxy_pass http://fieldtrack_backend/;
        proxy_buffering off;
        proxy_set_header Host __API_HOSTNAME__;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location = /ready {
        limit_req zone=fieldtrack_health burst=10 nodelay;
        proxy_pass http://fieldtrack_backend/;
        proxy_buffering off;
        proxy_set_header Host __API_HOSTNAME__;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # SSE
    location = /admin/events {
        limit_req zone=fieldtrack_api burst=10 nodelay;
        proxy_pass http://fieldtrack_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host __API_HOSTNAME__;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
        proxy_read_timeout 3600s;
    }

    # MAIN API
    location / {
        limit_req zone=fieldtrack_api burst=50 nodelay;
        proxy_pass http://fieldtrack_backend;
        proxy_http_version 1.1;
        proxy_set_header Host __API_HOSTNAME__;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering on;
    }

    # Grafana
    location /monitor/ {
        proxy_pass http://127.0.0.1:3333/monitor/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host __API_HOSTNAME__;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
    }

    location = /monitor {
        return 301 $scheme://$host/monitor/;
    }
}