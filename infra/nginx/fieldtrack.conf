# ============================================================================
# FieldTrack 2.0 — Production Nginx Reverse Proxy
# API: __API_DOMAIN__
# ============================================================================


# ----------------------------------------------------------------------------
# WebSocket support
# ----------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}


# ----------------------------------------------------------------------------
# Backend upstream (blue/green)
# __BACKEND_PORT__ is replaced by deploy-bluegreen.sh (3001=blue, 3002=green)
# ----------------------------------------------------------------------------
upstream fieldtrack_backend {
    server 127.0.0.1:__BACKEND_PORT__ max_fails=3 fail_timeout=30s;
    keepalive 32;
}


# ----------------------------------------------------------------------------
# Rate limiting
# ----------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=fieldtrack_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=fieldtrack_health:10m rate=5r/s;


# ----------------------------------------------------------------------------
# HTTP → HTTPS
# ----------------------------------------------------------------------------
server {

    listen 80;
    listen [::]:80;

    server_name __API_DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# ----------------------------------------------------------------------------
# HTTPS SERVER
# ----------------------------------------------------------------------------
server {

    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name __API_DOMAIN__;


    # SSL
    ssl_certificate /etc/letsencrypt/live/__API_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__API_DOMAIN__/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;


    # Hide nginx version from error pages and headers
    server_tokens off;


    # Real IP
    real_ip_header X-Forwarded-For;
    set_real_ip_from 127.0.0.1;
    real_ip_recursive on;


    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://__API_DOMAIN__; frame-ancestors 'self';" always;


    # Logging
    access_log /var/log/nginx/fieldtrack_access.log;
    error_log /var/log/nginx/fieldtrack_error.log;


    client_max_body_size 10M;


    # Compression — Nginx is the sole compression layer.
    # Fastify has no @fastify/compress registered.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types application/json application/javascript text/css text/plain text/xml application/xml application/xml+rss;


    # ------------------------------------------------------------------------
    # Block sensitive endpoints
    # ------------------------------------------------------------------------
    location /metrics { return 403; }
    location /internal { return 403; }
    location ~ ^/internal/ { return 403; }
    location /prometheus { return 403; }
    location /node-exporter { return 403; }


    # ------------------------------------------------------------------------
    # Health endpoint
    # ------------------------------------------------------------------------
    location = /health {

        limit_req zone=fieldtrack_health burst=10 nodelay;

        proxy_pass http://fieldtrack_backend;

        proxy_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }


    # ------------------------------------------------------------------------
    # Readiness endpoint
    # ------------------------------------------------------------------------
    location = /ready {

        limit_req zone=fieldtrack_health burst=10 nodelay;

        proxy_pass http://fieldtrack_backend;

        proxy_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }


    # ------------------------------------------------------------------------
    # Block Swagger UI and OpenAPI spec from public access.
    # Exposing these unauthenticated gives attackers a full API surface map.
    # ------------------------------------------------------------------------
    location /docs { return 403; }
    location /openapi.json { return 403; }


    # ------------------------------------------------------------------------
    # Server-Sent Events — disable buffering so events reach the client
    # immediately. Long-lived connection gets a generous read timeout.
    # ------------------------------------------------------------------------
    location = /admin/events {

        limit_req zone=fieldtrack_api burst=10 nodelay;

        proxy_pass http://fieldtrack_backend;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection '';

        # No buffering — SSE events must flow through immediately
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;

        # SSE connections stay open until the client disconnects;
        # 1-hour timeout is generous for a mobile/tablet dashboard.
        proxy_connect_timeout 10s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }


    # ------------------------------------------------------------------------
    # MAIN API PROXY
    # ------------------------------------------------------------------------
    location / {

        limit_req zone=fieldtrack_api burst=50 nodelay;

        proxy_pass http://fieldtrack_backend;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Authorization $http_authorization;

        # Tell the backend not to compress — Nginx handles compression.
        proxy_set_header Accept-Encoding "";

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
    }


    # ------------------------------------------------------------------------
    # Grafana monitoring
    # ------------------------------------------------------------------------
    location /monitor/ {

        proxy_pass http://127.0.0.1:3333/monitor/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Disable buffering to prevent streaming/live-tail issues in Grafana
        proxy_buffering off;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /monitor {
        return 301 $scheme://$host/monitor/;
    }

}
