# FieldTrack 2.0 — Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: "FieldTrack Dashboards"
    orgId: 1
    folder: "FieldTrack"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
